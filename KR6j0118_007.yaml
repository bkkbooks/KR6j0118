惑從第一劫乃至後身生生不生藥叉羅剎及富單那迦吒富單那鳩槃茶毘舍遮等并諸餓鬼有形無形有想無想如是惡處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處此諸眾生縱其自身不作福業十方如來所有功德悉與此人由是得於恒河沙阿僧祇不可說不可說劫常與諸佛同生一處無量功德如惡叉聚同處熏修永無分散是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒阿難是善男子持此呪時設犯禁戒於未受時持呪之後眾破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮阿難若有眾生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍復次阿難若有女人未生男女欲求生者若能至心憶念斯呪或能身上帶此悉怛多鉢怛羅者便生福德智慧男女求長命者速得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形阿難若諸國土州縣聚落饑荒疫癘或復刀兵賊難鬪諍兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有眾生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅阿難在在處處國土眾生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生眾生種種災異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥永不能入是故如來宣示此呪於未來世保護初學諸修行者入三摩提身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及眾中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧持此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誠心保護如是修菩提者爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毘舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事爾時八萬四千那由他恒河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒眾常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恒令此人所作如願阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大眾一心佇佛慈音瞪矒瞻仰爾時世尊讚阿難言善哉善哉汝等乃能普為大眾及諸末世一切眾生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝說阿難大眾合掌刳心默然受教佛言阿難當知妙性圓明離諸名相本來無有世界眾生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號阿難汝今欲修真三摩地直詣如來大涅槃者先當識此眾生世界二顛倒因顛倒不生斯則如來真三摩地阿難云何名為眾生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸眾生迷本圓明是生虛妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有眾生顛倒阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化眾生成十二類是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想阿難由因世界虛妄輪迴動顛倒故和合氣成八萬四千飛沈亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞由因世界雜染輪迴欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒱曇流轉國土人畜龍仙其類充塞由因世界執著輪迴趣顛倒故和合煖成八萬四千飜覆亂想如是故有濕相