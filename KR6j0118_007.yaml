body:
  text: 唐天竺沙門般剌蜜諦譯阿難汝問攝心我今先說入三摩地修學妙門求菩薩道要先持此四種律儀皎如氷霜自不能生一切枝葉心三口四生必無因阿難如是四事若不失遺心尚不緣色香味觸一切魔事云何發生若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚婬女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚于順風有何艱險若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後著新淨衣然香閑居誦此心佛所說神呪一百八遍然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪婬持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺已下取其黃土和上栴檀沈水蘇合薰陸欝金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞花鉢鏡外建立十六蓮華十六香鑪間花鋪設莊嚴香鑪純燒沈水無令見火取白牛乳置十六器乳為煎餅并諸沙糖油餅乳糜酥合蜜薑純酥純蜜及諸菓子飲食葡萄石蜜種種上妙等食於蓮華外各各十六圍繞華外以奉諸佛及大菩薩每以食時若在中夜取蜜半升用酥三合壇前別安一小火鑪以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎鑪內燒令煙盡饗佛菩薩令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毘俱知四天王等頻那夜迦張於門側左右安置又取八鏡覆懸虛空與壇場中所安之鏡方面相對使其形影重重相涉於初七日中至誠頂禮十方如來諸大菩薩及阿羅漢恒於六時誦呪繞壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毘奈耶先有願教第三七中於十二時一向持佛般怛羅呪至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如瑠璃阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就從三七後端坐安居經一百日有利根者不起于座得須陀洹縱其身心聖果未成決定自知成佛不謬汝問道場建立如是阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞唯願大慈重為宣說悲救此會諸修行輩末及當來在輪迴者承佛密音身意解脫于時會中一切大眾普皆作禮佇聞如來祕密章句爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恒河沙金剛密跡擎山持杵遍虛空界大眾仰觀畏愛兼抱求佛恃怙一心聽佛無見頂相放光如來宣說神呪大佛頂如來放光悉怛多鉢怛囉菩薩萬行品灌頂部錄出一名中印度那蘭陀曼茶羅灌頂金剛大道場神呪南牟薩怛他蘇伽哆耶歸命一切諸佛一阿囉訶帝三藐三菩陀耶歸命一切如來應正等覺二娜牟薩婆勃陀敬禮一切諸佛三勃地薩哆吠弊歸命菩薩毘㖿反四娜牟颯哆喃三藐三菩陀俱胝喃敬禮正遍知五薩失囉引皤去迦僧伽喃敬禮辟支佛及四果人六娜牟嚧雞阿囉喝哆喃歸命羅漢等眾七娜牟蘇嚕哆半那喃八娜牟塞羯唎二合陀引伽輕去彌喃敬禮斯陀含阿那含眾九娜牟盧鷄三藐伽哆喃敬禮過去未來十娜牟三藐鉢囉二合底半那去喃十一娜牟提婆唎史喃敬禮三十三天及一切諸仙天等十二娜牟微悉陀耶微入聲呼地也二合陀囉喃敬禮呪仙十三娜牟悉陀微地也二合陀囉㗚史喃敬禮持呪成就仙人十四舍波去拏揭囉訶娑訶摩囉陀二合喃攝惡作善十五娜牟皤囉二合訶摩二合埿歸命梵天十六娜牟因去陀囉二合耶歸命帝釋十七娜牟婆伽嚩帝歸命世尊十八嚕陀囉二合引耶大自在天十九烏摩鉢底天后娑醯夜耶及眷屬等二十娜牟婆伽筏蒱末反帝世尊二十一那囉延拏耶地祇眾二十二半遮摩訶沒陀囉大印二十三娜牟塞訖哩二合多耶頂禮世尊二十四娜牟婆伽上呼筏帝摩訶迦囉耶大黑天神二十五底哩二合補囉那伽上囉城二十六毘陀囉皤拏迦囉耶破壞二十七阿底目多迦尸摩舍那縛悉埿尸陀林中二十八摩怛唎二合伽拏鬼神眾二十九娜牟塞訖唎多耶三十娜牟婆伽筏帝舊怛他揭多俱囉耶如來族三十一娜牟鉢頭摩二合俱囉耶歸命蓮華族菩薩等三十二娜牟筏折囉俱囉半音用同下耶歸命金剛族三十三娜牟摩尼俱囉耶歸命寶族三十四娜牟伽上闍俱囉耶歸命眾族三十五娜牟婆伽筏帝三十六地唎二合茶輸囉哂那三十七鉢囉二合訶囉拏囉引闍耶大猛將各持器仗入三十八怛他揭多耶如來三十九娜牟婆伽筏帝四十阿彌陀引婆引耶無量壽佛四十一怛他揭多耶四十二阿囉訶帝三藐三菩陀耶應等正覺四十三娜牟婆伽筏帝四十四阿芻鞞也阿閦如來四十五怛他揭多耶四十六阿羅訶帝三藐三菩陀耶四十七娜牟婆伽筏帝四十八毘沙闍俱嚕二合吠琉璃唎耶藥師如來四十九鉢囉二合婆囉引闍耶光王五十怛他揭多耶五十一阿囉訶帝三藐三菩陀耶五十二娜牟婆伽筏帝五十三三布瑟畢多娑囉囉引闍夜娑羅花王五十四怛他揭多耶五十五阿囉訶帝三藐三菩陀引耶五十六娜牟婆伽筏帝五十七舍枳也二合母娜曳釋迦牟尼佛五十八怛他揭多耶五十九阿囉訶帝三藐三菩陀引耶六十娜牟婆伽筏帝六十一囉怛那俱蘇摩寶花六十二鷄都囉引闍耶寶幢王如來六十三怛他揭多耶六十四阿羅訶帝三藐三菩陀引耶帝瓢六十五娜牟塞訖哩二合多皤翳摩含婆伽筏多六十六薩怛他揭都烏瑟尼衫如來佛頂六十七悉怛多引鉢怛㘕二合華蓋六十八娜牟阿波引囉支單半音敬禮是辰勝六十九鉢羅登登甑反擬擬異反囉七十薩嚩部多揭囉二合訶迦囉尼一切神眾作罰七十一波囉微入地也二合掣車曳反陀輕呼儞能斷他呪七十二阿哥引囉輕呼微哩入二合駐橫死七十三波唎怛囉耶引那揭唎救取七十四薩嚩畔陀那𢛡乞叉那迦唎一切縛禁解脫七十五薩嚩突瑟吒二合除一切惡七十六上突莎般那儞縛囉尼惡夢七十七者都囉引室底喃八萬四千眾神七十八揭囉訶娑訶娑囉引喃七十九微陀防娑引那羯哩打破八十阿瑟吒氷設底喃去聲呼八十一呼皆同諾剎怛囉喃八十二鉢囉二合娑引陀那羯哩正行阿瑟吒二合喃八十三摩訶揭囉訶喃辰八十四微陀防二合薩那羯哩打破八十五薩嚩舍都嚕二合儞嚩囉尼除一切惡八十六巨去囉喃八十七突室乏二合鉢那難遮那舍尼除却嚴惡八十八毘沙設薩怛囉器仗八十九阿祁尼火九十烏陀迦囉尼水九十一阿波引囉視多具囉苻能勝嚴九十二摩訶跋囉戰拏大力嗔怒九十三摩訶提哆火天九十四摩訶帝闍大滅九十五摩訶稅尾二合多太白九十六什伐二合囉光焰九十七摩訶跋囉大力九十八半茶囉嚩引悉儞白拂九十九阿唎耶多囉聖者一百毘哩二合俱知制嚩毘闍耶最勝菩薩百一筏折囉二合摩禮底毘輸嚕多摧碎金剛百二鉢踏罔迦降伏百三跋折囉兒熾曳反訶縛者金剛力士百四摩囉制縛隨一逐百五般囉室多金剛神杵百六跋折時熱反上囉二合檀持金剛神杵百七毘舍羅摩遮天神力士百八扇多舍毘提嚩布室哆蘇摩嚕波參辰日月天子及二十八宿百九摩訶引稅尾二合多引太白星百十阿哩耶多羅百十一摩訶引跋囉阿波囉百十二跋折囉二合商羯囉制婆金剛連鎖百十三怛他天可反跋折囉俱摩唎迦金剛童女百十四俱㘕盧紺反咃唎金剛童子百十五跋折囉訶薩哆者二合金剛手百十六微地也大明呪藏百十七乾遮那摩引唎迦四天王太子百十八俱蘇婆喝囉怛囉怛那百十九毘嚕遮耶那俱唎耶百二十韜淡吐炎夜囉烏瑟尼二合沙佛頂百二十一毘折藍婆摩邏遮羅剎神女百二十二跋折囉二合迦那迦金剛使者百二十三鉢囉二合婆咾去遮那蓮華神眾百二十四跋折囉二合敦尼遮金剛擎山百二十五稅尾多遮迦摩引囉引乞叉二合百二十六舍施鉢囉二合婆翳帝夷帝如是等百二十七母引陀囉二合尼揭拏眾印可百二十八娑吠囉乞懺二合一切護我百二十九俱囉飯二合都印㝹那麼麼某乙稱名那寫誦呪者但至此語皆自稱名百三十嗚吽二合牟哩二合瑟揭二合渠羯反皆同拏仙眾百三十一鉢囉二合舍引薩多善相百三十二薩怛他揭都一切如來百三十三烏瑟尼沙百三十四呼吽二合咄嚕吽三合警誤百三十五瞻婆那押領百三十六呼吽二合咄嚕吽三合百三十七薩耽婆那鎮守百三十八呼吽二合咄嚕吽三合百三十九婆囉微地也三婆乞叉那囉百四十呼吽二合咄嚕吽三合百四十一薩婆部瑟吒喃百四十二塞曇婆那羯囉喫却他呪百四十三呼吽二合咄嚕吽三合百四十四薩嚩藥叉勇猛百四十五喝囉引剎娑揭囉訶喃百四十六毘陀防娑那羯囉打破百四十七呼吽二合咄嚕吽三合百四十八者都羅尸底喃百四十九揭囉訶娑囉喃八萬四千神王眾百五十毘陀防娑那羯囉百五十一呼吽二合咄嚕吽三合百五十二阿瑟吒微二合摩舍帝喃上百五十三那佉上沙怛囉喃上百五十四婆囉摩馱那伽囉百五十五呼吽二合咄嚕吽三合百五十六囉剎囉剎護一切諸佛菩薩金剛天仙皆護百五十七薄伽梵佛百五十八薩怛他揭都烏瑟尼沙佛頂百五十九鉢囉登擬哩百六十摩訶薩訶薩囉部兒千臂大神百六十一娑訶薩囉室囇千頭神百六十二俱胝舍多娑訶薩囉寧怛㘑百千眼神百六十三阿弊地也什嚩哩多那吒迦百六十四摩訶跋折嚕陀引囉大輪金剛百六十五帝哩菩嚩那三世百六十六曼茶囉檀場百六十七嗚吽莎悉底百六十八薄婆都與我平等百六十九印㝹麼麼某乙百七十囉闍婆夜王難百七十一主囉婆夜賊難百七十二阿祇尼婆夜火難百七十三烏陀迦婆夜水難百七十四吠沙婆夜毒難百七十五舍薩多囉婆夜刀仗難百七十六波囉斫羯囉婆夜兵難百七十七突㗚叉婆夜穀貴飢饉難百七十八阿舍儞婆夜雹難百七十九阿迦囉沒㗚利吉反駐婆夜掩死難百八十阿陀囉尼部彌劍波總持地動百八十一伽波哆婆夜險難百八十二烏囉囉迦波多婆夜道路難百八十三囉闍彈茶婆夜王刑罰難百八十四那上伽婆夜龍怖難百八十五微地揄婆夜閃電難百八十六蘇跋㗚尼婆夜金翄鳥難百八十七藥叉揭囉訶百八十八羅剎娑揭囉訶百八十九畢唎哆揭囉二合訶餓鬼難百九十毘舍上遮揭囉訶廁神百九十一部多揭囉二合訶神鬼眾百九