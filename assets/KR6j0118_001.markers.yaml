  - {type: variant, offset: 39, length: 24, content: 菩薩戒弟子〔前正諫大夫〕－【元】前正諫大夫【大】，〔－〕【元】前正諫＝議【宋】【明】諫【大】，議【宋】【明】諫議大夫同中書門下平章事〔清河〕－【宋】【元】清河【大】，〔－〕【宋】【元】清河房融筆授＝受【三】授【大】，受【宋】【元】【明】授受, 宋: 烏長國沙門彌伽釋迦譯語, 元: 烏長國沙門彌伽釋迦譯語, 明: 烏長國沙門彌伽釋迦譯語}
