  - {type: variant, offset: 0, length: 39, content: 大唐神龍元年龍集乙巳五月己卯朔二十三日辛丑中天竺沙門般剌蜜帝＝諦【三】＊帝【大】＊，諦【宋】＊【元】＊【明】＊帝諦於廣州制止道場譯出, 宋: 神龍元年歲次乙已五月己卯朔二十三日辛丑於廣州制止道場譯出天竺沙門般剌蜜諦譯, 元: 神龍元年歲次乙已五月己卯朔二十三日辛丑於廣州制止道場譯出天竺沙門般剌蜜諦譯, 明: 唐天竺沙門般剌密諦譯}
