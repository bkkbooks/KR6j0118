body:
  text: 新印大佛頂首楞嚴經序前雄武軍節度推官許洞撰楞嚴經者括諸佛萬行之樞紐也通幽洞微非二乘所賾開物成務乃十地攸宗其文曲而達其旨隱而暢入於至妙之域出於無生之表鏗鏘磅礴群彙率化窮玄絕聖其在茲乎是知大和無私雖幽必煦至神無迹雖微必貫玄功無宰雖遐必達率由心絕有為而大千同照道躋無作而至感必通如來謂斯經可以鼓吹乎群心開決乎佛性爰集大眾會于室羅筏城天龍鬼神共覃斯教嗚呼三界以五欲而成故摩登伽以宣淫為發題之始也眾生以愛纏而起故阿難以破惑為成道之基也是以論有心則以無心為攝悲有生則以無生為誘談有相則破一切色境為主示有作則脫一切煩惱為樂此蓋覺虛妄而歸真實也至若舉三十六地獄之因果十鬼十類之緣業此蓋昧真實而起虛妄也不明實相無以煥菩提之心不破妄塵無以悟眾生之性是法微妙知之者亦已鮮矣能深究於此復廣其利於天下余見其大佛頂如來萬行首楞嚴經序趙宋泉南沙門釋祖派述至心歸命禮南謨無見頂相首楞嚴王圓如來之密因具菩薩之萬行真修行路妙證悟門大乘義以了明一切事而究竟爰自祇園休夏聖王延齋紫金光聚耀十方迦陵仙音流法界恒沙薩埵咸來咨決心疑闔國王臣畢集願聞法要教由緣起阿難被溺於婬坊道假人弘師利承宣於祕呪由是七處徵心全是妄性淨元明八還顯見本來真覺圓常住標迷悟之根本令諸闡提而墮彌戾車示同別之狂勞俾一顛迦而摧惡叉聚富樓那執相難性四緣本紀於異同波斯匿惑斷為常一念元無於生滅妙明覺體非因非緣非自然精真見元不合不和不離即以至六根虛妄無非菩提妙心七大遍周盡是如來藏性三緣永斷不迷鏡裏之頭二義斯明頓悟衣中之寶金鐘擊處聲滅而聞自不消華㲲綰時六忘而一不可得譬夫天王賜屋二十五聖而各陳悟入之門遠客遊方十河沙眾而盡識歸還之路勅文殊之揀選誰當其根指觀音之圓通實從中入而況三無漏學真為修習之要機四淨律儀實號秉持之明誨欲誦祕密之章句須嚴清淨之壇場無邊積業悉氷消一切所求皆果遂復乃開三門之漸次是先佛之規模立五品之名題作將來之眼目良由兩種之顛倒遂成十二之類生歷七趣之輪迴織五重之渾濁於是迴千光相攬七寶床深憐恣客迷主人痛念認賊為己子洗心非正五十重之魔境現前覺際入交四十四之聖心超越而後慶喜欽承於妙誨能仁宣發於真慈窮五陰之妄源勝十方之獻寶貧人七錢而布施尚獲輪王行者一念以流通定登佛果真乘奧典祕字靈文大佛頂如來密因修證了義諸菩薩萬行首楞嚴經甚深法藏
